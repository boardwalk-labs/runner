# Publish to npm with provenance on a version tag (v0.1.0 -> @boardwalk-labs/runner@0.1.0).
# Auth: npm Trusted Publishing via GitHub OIDC (no stored token). Configure the trusted publisher
# for @boardwalk-labs/runner on npmjs.com: org boardwalk-labs, repo boardwalk-labs/runner,
# workflow .github/workflows/release.yml. The tag must match package.json's version (guard below).

name: Release

on:
  push:
    tags: ["v*"]

env:
  # Run JS actions on Node 24 now (GitHub forces this 2026-06-16); a no-op once it is the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm --provenance (Trusted Publishing)
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Tag must match package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME != package.json $PKG_VERSION" >&2
            exit 1
          fi
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # The clause-3 uniqueness reseed native addon (native/reseed.c → prebuilds/linux-x64/*.node).
      # Built HERE on the ubuntu-x64 runner because the Firecracker snapshot substrate is
      # Intel-x86-only (nested virtualization is Intel-x86-only), so linux-x64 is the only platform
      # that ever loads it; every other consumer (arm64 hosted runners, self-host) no-ops via
      # node-gyp-build's absent-prebuild path. `files` ships prebuilds/ in the package.
      # prebuildify shells out to `node-gyp` by bare name, so it must be on PATH — install it
      # globally (ubuntu-latest already has python3 + build-essential for the compile).
      - run: npm install -g node-gyp
      - run: pnpm exec prebuildify --napi --strip -t 24.0.0
      - run: ls prebuilds/linux-x64/*.node
      # Trusted Publishing needs a recent npm (>= 11.5.1); node 24's bundled npm may be older.
      - run: npm install -g npm@latest
      - run: npm publish --provenance --access public

  # The self-hosted RUN image (base + the just-published runtime). Runs AFTER publish so it installs
  # the version that landed on npm. Base + runtime layer, mirroring the hosted worker image.
  image:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@v5
      - name: Resolve version from the tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RUNNER_VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/boardwalk-labs/runner:${{ env.VERSION }}
            ghcr.io/boardwalk-labs/runner:latest
          provenance: true
          sbom: true
