# Publish to npm with provenance on a version tag (v0.1.0 -> @boardwalk-labs/runner@0.1.0).
# Auth: npm Trusted Publishing via GitHub OIDC (no stored token). Configure the trusted publisher
# for @boardwalk-labs/runner on npmjs.com: org boardwalk-labs, repo boardwalk-labs/runner,
# workflow .github/workflows/release.yml. The tag must match package.json's version (guard below).

name: Release

on:
  push:
    tags: ["v*"]

env:
  # Run JS actions on Node 24 now (GitHub forces this 2026-06-16); a no-op once it is the default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm --provenance (Trusted Publishing)
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - name: Tag must match package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag $GITHUB_REF_NAME != package.json $PKG_VERSION" >&2
            exit 1
          fi
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      # The clause-3 uniqueness reseed native addon (native/reseed.c → prebuilds/linux-x64/*.node).
      # Built HERE on the ubuntu-x64 runner because the Firecracker snapshot substrate is
      # Intel-x86-only (nested virtualization is Intel-x86-only), so linux-x64 is the only platform
      # that ever loads it; every other consumer (arm64 hosted runners, self-host) no-ops via
      # node-gyp-build's absent-prebuild path. `files` ships prebuilds/ in the package.
      # prebuildify shells out to `node-gyp` by bare name; it's a devDependency, so `pnpm exec`
      # puts node_modules/.bin (incl. node-gyp) on PATH — NOT installed globally, which would
      # perturb the global npm that the provenance publish below relies on. ubuntu-latest ships
      # python3 + build-essential for the compile.
      - run: pnpm exec prebuildify --napi --strip -t 24.0.0
      - run: ls prebuilds/linux-x64/*.node
      # Publish with node 24's BUNDLED npm (11.6.x, already >= the 11.5.1 Trusted-Publishing
      # threshold). Do NOT `npm install -g npm@latest`: npm 12.0.0's self-install leaves the
      # provenance publisher unable to require `sigstore` (Cannot find module 'sigstore'), which
      # broke every v0.1.12 publish attempt. If the bundled npm ever drops below 11.5.1, pin a
      # specific known-good 11.x here rather than @latest.
      # A prerelease version (anything with a `-`) publishes under the `next` dist-tag so
      # `latest` keeps pointing at the current stable line for plain installs.
      - name: Publish (prereleases under --tag next)
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          case "$PKG_VERSION" in
            *-*) npm publish --provenance --access public --tag next ;;
            *)   npm publish --provenance --access public ;;
          esac

  # The self-hosted RUN image (base + the just-published runtime). Runs AFTER publish so it installs
  # the version that landed on npm. Base + runtime layer, mirroring the hosted worker image.
  image:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@v5
      - name: Resolve version from the tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            RUNNER_VERSION=${{ env.VERSION }}
          tags: |
            ghcr.io/boardwalk-labs/runner:${{ env.VERSION }}
            ghcr.io/boardwalk-labs/runner:latest
          provenance: true
          sbom: true
